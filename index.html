<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANX PANEL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <h1>VANX PANEL</h1>
</header>

<section class="hero">
  <h2>Panel Murah & Cepat ⚡</h2>
  <p>Fast respon • Server stabil • Harga pelajar</p>
</section>

<section class="pricing">

<!-- 1GB - 7GB -->
<div class="box" onclick="pilih('1GB','1000')"><h2>1GB</h2><p class="price">Rp1.000</p></div>
<div class="box" onclick="pilih('2GB','1000')"><h2>2GB</h2><p class="price">Rp1.000</p></div>
<div class="box" onclick="pilih('3GB','1000')"><h2>3GB</h2><p class="price">Rp1.000</p></div>
<div class="box" onclick="pilih('4GB','1000')"><h2>4GB</h2><p class="price">Rp1.000</p></div>
<div class="box" onclick="pilih('5GB','1000')"><h2>5GB</h2><p class="price">Rp1.000</p></div>
<div class="box" onclick="pilih('6GB','1000')"><h2>6GB</h2><p class="price">Rp1.000</p></div>
<div class="box" onclick="pilih('7GB','1000')"><h2>7GB</h2><p class="price">Rp1.000</p></div>

<!-- 8-10 -->
<div class="box" onclick="pilih('8GB','2000')"><h2>8GB</h2><p class="price">Rp2.000</p></div>
<div class="box" onclick="pilih('9GB','3000')"><h2>9GB</h2><p class="price">Rp3.000</p></div>
<div class="box" onclick="pilih('10GB','4000')"><h2>10GB</h2><p class="price">Rp4.000</p></div>

<!-- UNLI -->
<div class="box best" onclick="pilih('UNLI','5000')">
  <div class="tag">BEST</div>
  <h2>UNLI</h2>
  <p class="price">Rp5.000</p>
</div>

</section>

<section class="form" id="form">
  <h2>Form Order</h2>
  <input id="nama" placeholder="Nama">
  <input id="wa" placeholder="Nomor WhatsApp">
  <input id="paket" readonly placeholder="Paket">
  <input id="harga" readonly placeholder="Harga">
  <button onclick="kirim()">Order Sekarang</button>
</section>

<div id="toast"></div>
<div id="live"></div>

<script src="script.js"></script>
</body>
</html>
