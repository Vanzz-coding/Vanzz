<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANX PANEL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <div class="logo">VANX PANEL</div>
</header>

<section class="hero">
  <h1>Panel Murah & Cepat ⚡</h1>
  <p>Deploy cepat • Server stabil • Harga pelajar</p>
</section>

<section class="pricing">

  <div class="box" onclick="pilih('1GB','1000')">
    <h2>1GB</h2>
    <p class="price">Rp1.000</p>
    <button>Pilih</button>
  </div>

  <div class="box" onclick="pilih('2GB','2000')">
    <h2>2GB</h2>
    <p class="price">Rp2.000</p>
    <button>Pilih</button>
  </div>

  <div class="box best" onclick="pilih('UNLI','5000')">
    <div class="tag">BEST</div>
    <h2>UNLI</h2>
    <p class="price">Rp5.000</p>
    <button>Pilih</button>
  </div>

</section>

<section class="form" id="form">
  <h2>Detail Order</h2>

  <input id="nama" placeholder="Nama">
  <input id="wa" placeholder="Nomor WhatsApp">
  <input id="paket" readonly placeholder="Paket">
  <input id="harga" readonly placeholder="Harga">

  <button onclick="kirim()">Order Sekarang</button>
</section>

<div id="toast"></div>

</body>
<script src="script.js"></script>
</html>
