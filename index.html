<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANX PANEL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1>VANX PANEL</h1>
</header>

<section class="hero fade">
  <h2>Beli Panel Murah ⚡</h2>
  <p>Fast respon • Harga pelajar • Server stabil</p>
</section>

<section class="container fade">

  <div class="card" onclick="pilih('1GB','1000')">
    <h3>1GB</h3>
    <p>Rp1.000</p>
    <button>Beli</button>
  </div>

  <div class="card" onclick="pilih('2GB','2000')">
    <h3>2GB</h3>
    <p>Rp2.000</p>
    <button>Beli</button>
  </div>

  <div class="card best" onclick="pilih('UNLI','5000')">
    <span class="badge">BEST</span>
    <h3>UNLI</h3>
    <p>Rp5.000</p>
    <button>Beli</button>
  </div>

</section>

<section class="form fade" id="form">
  <h2>Form Order</h2>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="wa" placeholder="Nomor WhatsApp">
  <input type="text" id="paket" readonly placeholder="Paket">
  <input type="text" id="harga" readonly placeholder="Harga">

  <button onclick="kirim()">Order Sekarang</button>
</section>

<div id="popup" class="popup"></div>

<footer>
  <p>© VANX PANEL</p>
</footer>

<script src="script.js"></script>
</body>
</html>
