<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beli Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>PANEL STORE</h1>
  <p>Panel Murah & Berkualitas</p>
</header>

<section class="container">

  <div class="card" onclick="pilih('1GB','1000')">
    <h2>1GB</h2>
    <p>Rp1.000</p>
  </div>

  <div class="card" onclick="pilih('2GB','2000')">
    <h2>2GB</h2>
    <p>Rp2.000</p>
  </div>

  <div class="card" onclick="pilih('UNLI','5000')">
    <h2>UNLI</h2>
    <p>Rp5.000</p>
  </div>

</section>

<section class="form" id="form">
  <h2>Order Panel</h2>

  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="wa" placeholder="Nomor WhatsApp">
  <input type="text" id="paket" placeholder="Paket" readonly>
  <input type="text" id="harga" placeholder="Harga" readonly>

  <button onclick="kirim()">Order Sekarang</button>
</section>

<footer>
  <p>© Panel Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
