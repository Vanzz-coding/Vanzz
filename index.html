<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Beli Panel - VANX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>VANX PANEL</h1>
  <p>Panel Murah & Auto Create</p>
</header>

<section class="produk">
  <h2>Pilih Paket Panel</h2>

  <div class="card">
    <h3>1GB</h3>
    <p>Rp 1.000</p>
    <button onclick="pilih('1GB','1000')">Beli</button>
  </div>

  <div class="card">
    <h3>2GB</h3>
    <p>Rp 2.000</p>
    <button onclick="pilih('2GB','2000')">Beli</button>
  </div>

  <div class="card">
    <h3>UNLI</h3>
    <p>Rp 5.000</p>
    <button onclick="pilih('UNLI','5000')">Beli</button>
  </div>

</section>

<section class="form" id="formOrder">
  <h2>Order Panel</h2>
  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="wa" placeholder="Nomor WhatsApp">
  <input type="text" id="paket" readonly placeholder="Paket">
  <input type="text" id="harga" readonly placeholder="Harga">

  <button onclick="kirim()">Order Sekarang</button>
</section>

<footer>
  <p>© VANX PANEL</p>
</footer>

<script src="script.js"></script>
</body>
</html>
