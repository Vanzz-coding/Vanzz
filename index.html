<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PANEL -->
<div class="panel">
  <h2>Pilih Panel</h2>

  <div class="ram" id="ramList">

    <!-- 1-7 = 1K -->
    <div class="ram-box active" data-p="1GB" data-h="1000">1GB<br>Rp1.000</div>
    <div class="ram-box" data-p="2GB" data-h="1000">2GB<br>Rp1.000</div>
    <div class="ram-box" data-p="3GB" data-h="1000">3GB<br>Rp1.000</div>
    <div class="ram-box" data-p="4GB" data-h="1000">4GB<br>Rp1.000</div>
    <div class="ram-box" data-p="5GB" data-h="1000">5GB<br>Rp1.000</div>
    <div class="ram-box" data-p="6GB" data-h="1000">6GB<br>Rp1.000</div>
    <div class="ram-box" data-p="7GB" data-h="1000">7GB<br>Rp1.000</div>

    <!-- 8-10 -->
    <div class="ram-box" data-p="8GB" data-h="2000">8GB<br>Rp2.000</div>
    <div class="ram-box" data-p="9GB" data-h="3000">9GB<br>Rp3.000</div>
    <div class="ram-box" data-p="10GB" data-h="4000">10GB<br>Rp4.000</div>

    <!-- UNLI -->
    <div class="ram-box" data-p="UNLI" data-h="5000">UNLI<br>Rp5.000</div>

  </div>

  <button onclick="buatInvoice()">🛒 Beli Sekarang</button>
</div>

<!-- INVOICE -->
<div class="invoice" id="invoiceBox">

  <h2>🧾 Invoice Pembayaran</h2>

  <div class="inv-card">
    <p>ID Transaksi</p>
    <h3 id="invId">-</h3>

    <p>Paket</p>
    <h3 id="invPaket">-</h3>

    <p>Total</p>
    <h1 id="invHarga">Rp0</h1>
  </div>

  <img src="qris.png" class="qris">

  <p class="note">Scan QRIS lalu transfer sesuai nominal</p>

  <button onclick="kirimBukti()">📤 Kirim Bukti Transfer</button>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
